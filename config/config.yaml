# BLV Synth Data Collector — User Configuration
# ================================================
# Edit this file to set persistent defaults that carry across IsaacSim runs.
# Values here override the extension.toml defaults but can still be changed
# at runtime through the UI.

# --- Project ---
# environment + asset_class_name are typically left blank here so the user
# enters them in the UI at the start of a session and clicks "Apply Settings"
# to resolve all derived paths.
asset_root_folder: "/media/hochul/CrucialX10/NeurIPS_Dataset/synthetic_objects"
root_folder: "/media/hochul/CrucialX10/NeurIPS_Dataset/collected_data"
environments_folder: "/media/hochul/Crucial X10/NeurIPS_Dataset/environments"
environment: ""
asset_class_name: ""

# --- Camera ---
camera_path: "/World/BLV_Camera"
move_speed: 20.0
look_speed: 30.0
focal_length: 28.0   # in mm — USD uses "tenths of a scene unit"; see camera setup

# --- Rendering ---
resolution_width: 1280
resolution_height: 720
rt_subframes: 4

# --- Asset Browser ---
# asset_root_folder is the parent directory; the asset_class_name from the
# Project section above is also the subfolder name, so assets are scanned at:
#   {asset_root_folder}/{asset_class_name}/*.usd*

parent_prim_path: "/World"

# --- Data Capture (annotators) ---
# Toggle which annotators the BasicWriter enables.
annotators:
  rgb: true
  semantic_segmentation: true
  colorize_semantic_segmentation: true
  bounding_box_2d_tight: true
  bounding_box_2d_loose: false
  bounding_box_3d: false
  instance_segmentation: false
  normals: false
  distance_to_image_plane: false
